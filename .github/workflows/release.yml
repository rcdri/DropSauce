name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'New version name (e.g. 1.2.3) — release tag will be created as v<version>'
        required: true
        type: string

concurrency:
  group: release-workflow
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    env:
      # Optional: test the future runtime now
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Validate version_name input
      run: |
        VERSION_NAME="${{ inputs.version_name }}"

        # Reject branch-like names that must never be used as tags
        RESERVED_NAMES="main master develop dev release"
        for reserved in $RESERVED_NAMES; do
          if [ "$VERSION_NAME" = "$reserved" ]; then
            echo "::error::version_name '${VERSION_NAME}' is a reserved branch name and cannot be used as a version/tag."
            exit 1
          fi
        done

        # Require the version to match a semver-like pattern (no leading 'v'; release tag will be v<version>)
        if ! echo "$VERSION_NAME" | grep -qE '^[0-9]+(\.[0-9]+)*(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'; then
          echo "::error::version_name '${VERSION_NAME}' is invalid. Use a semver-like format such as '1.2.3' or '1.2.3-beta.1'. The release tag will be created as v${VERSION_NAME}."
          exit 1
        fi

        echo "version_name '${VERSION_NAME}' is valid. Release tag will be: v${VERSION_NAME}"

    - name: Checkout code
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        if [ -n "$KEYSTORE_BASE64" ]; then
          echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
        else
          echo "No keystore secret found, creating debug keystore"
          keytool -genkey -v -keystore release.keystore -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass password -keypass password \
            -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, S=Debug, C=US"
        fi

    - name: Update versionName and increment versionCode
      run: |
        VERSION_NAME="${{ inputs.version_name }}"
        BUILD_GRADLE="app/build.gradle"

        sed -i -E "s/(versionName = ')[^']*(')/\1${VERSION_NAME}\2/" "$BUILD_GRADLE"
        CURRENT_CODE=$(grep -E "versionCode = [0-9]+" "$BUILD_GRADLE" | head -n1 | sed -E "s/.*= ([0-9]+)/\1/")
        NEXT_CODE=$((CURRENT_CODE + 1))
        sed -i -E "s/versionCode = [0-9]+/versionCode = ${NEXT_CODE}/" "$BUILD_GRADLE"

    - name: Build Release APK
      run: |
        ./gradlew assembleRelease --no-daemon --stacktrace \
          -PRELEASE_STORE_FILE=../release.keystore \
          -PRELEASE_STORE_PASSWORD="${{ secrets.RELEASE_STORE_PASSWORD || 'password' }}" \
          -PRELEASE_KEY_ALIAS="${{ secrets.RELEASE_KEY_ALIAS || 'release' }}" \
          -PRELEASE_KEY_PASSWORD="${{ secrets.RELEASE_KEY_PASSWORD || 'password' }}"

    - name: Commit version updates
      id: version_commit
      run: |
        BRANCH_NAME="${{ github.ref_name }}"

        if git diff --quiet -- app/build.gradle; then
          echo "No version changes to commit"
          echo "commit_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add app/build.gradle
        git commit -m "chore(release): set versionName ${{ inputs.version_name }} and bump versionCode"

        # Use refs/heads/ explicitly to avoid ambiguity with any tag that shares the branch name
        for attempt in 1 2 3; do
          if git push origin "HEAD:refs/heads/$BRANCH_NAME"; then
            break
          fi
          if [ "$attempt" -eq 3 ]; then
            echo "Failed to push version commit after 3 attempts"
            exit 1
          fi
          git pull --rebase origin "refs/heads/$BRANCH_NAME"
          sleep 2
        done

        echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

    - name: Find previous successful release workflow run
      id: previous_success
      uses: actions/github-script@v8
      with:
        script: |
          const owner = context.repo.owner;
          const repo = context.repo.repo;
          const workflowId = "release.yml";

          const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
            owner,
            repo,
            workflow_id: workflowId,
            status: "completed",
            per_page: 100,
          });

          const previous = runs.find((run) => run.conclusion === "success" && run.id !== context.runId);
          core.setOutput("sha", previous ? previous.head_sha : "");

    - name: Generate Changelog
      id: changelog
      run: |
        PREVIOUS_SUCCESS_SHA="${{ steps.previous_success.outputs.sha }}"
        CURRENT_SHA="${{ steps.version_commit.outputs.commit_sha }}"

        if [ -z "$PREVIOUS_SUCCESS_SHA" ]; then
          CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
        else
          CHANGELOG=$(git log --pretty=format:"- %s (%h)" "$PREVIOUS_SUCCESS_SHA..$CURRENT_SHA" --no-merges --invert-grep --grep='^chore(release): set versionName ')
        fi

        if [ -z "$CHANGELOG" ]; then
          CHANGELOG="- No changes since last successful release workflow run"
        fi

        echo "changelog<<EOF" >> $GITHUB_OUTPUT
        echo "$CHANGELOG" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Collect Release APKs
      id: assets
      run: |
        mkdir -p release
        shopt -s nullglob
        APK_FILES=(app/build/outputs/apk/release/*.apk)
        if [ ${#APK_FILES[@]} -eq 0 ]; then
          echo "Error: No APK file found"
          exit 1
        fi

        DOWNLOAD_NOTES=""
        for apk in "${APK_FILES[@]}"; do
          if [ ${#APK_FILES[@]} -eq 1 ]; then
            target="release/DropSauce-v${{ inputs.version_name }}.apk"
          else
            original_apk_name=$(basename "$apk" .apk)
            target="release/DropSauce-v${{ inputs.version_name }}-${original_apk_name}.apk"
          fi
          cp "$apk" "$target"
          DOWNLOAD_NOTES="$(printf '%s- `%s`\n' "$DOWNLOAD_NOTES" "$(basename "$target")")"
        done

        echo "download_notes<<EOF" >> "$GITHUB_OUTPUT"
        echo "$DOWNLOAD_NOTES" >> "$GITHUB_OUTPUT"
        echo "EOF" >> "$GITHUB_OUTPUT"

    - name: Create Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG="v${{ inputs.version_name }}"
        NOTES_FILE="release_notes.md"

        cat > "$NOTES_FILE" <<'EOF'
        ## DropSauce v${{ inputs.version_name }}

        ### Installation Instructions
        1. Download and install the apk file first
        2. go to the Explore menu> Manage and click the pen icon to add an extension repo
        3. install and use the extensions, read, add items to the favorites and ENJOY!
        If this is your first time using the app, I recommend uninstalling any extension you find when opening the app for the first time and then installing latest extensions from your preferred repository"

        ### Changelog
        ${{ steps.changelog.outputs.changelog }}
        EOF

        gh release create "$TAG" release/*.apk \
          --title "$TAG" \
          --target "${{ steps.version_commit.outputs.commit_sha }}" \
          --notes-file "$NOTES_FILE"

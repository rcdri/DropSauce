name: Nightly Build

on:
  schedule:
    - cron: "30 16 * * *"   # Daily at 16:30 UTC (00:30 +8)
  workflow_dispatch:        # Manual trigger

permissions:
  contents: write

jobs:
  nightly:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Check for recent commits
      id: check
      run: |
        COMMIT_COUNT=$(git log --since="24 hours ago" --oneline --no-merges | wc -l)
        echo "commit_count=$COMMIT_COUNT" >> "$GITHUB_OUTPUT"
        if [ "$COMMIT_COUNT" -eq 0 ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
          echo "No commits in the last 24 hours, skipping build"
          echo "should_build=false" >> "$GITHUB_OUTPUT"
        else
          echo "Found $COMMIT_COUNT commits, proceeding with build"
          echo "should_build=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Set up JDK
      if: steps.check.outputs.should_build == 'true'
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      if: steps.check.outputs.should_build == 'true'
      run: chmod +x gradlew

    - name: Decode keystore
      if: steps.check.outputs.should_build == 'true'
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        if [ -n "$KEYSTORE_BASE64" ]; then
          echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
        else
          keytool -genkey -v -keystore release.keystore -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass password -keypass password \
            -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, S=Debug, C=US"
        fi

    - name: Pre-warm JitPack dependencies
      if: steps.check.outputs.should_build == 'true'
      run: |
        PARSERS_VERSION=$(grep 'parsers = ' gradle/libs.versions.toml | sed 's/.*= "\(.*\)"/\1/')
        echo "Pre-warming JitPack for kotatsu-parsers:${PARSERS_VERSION}"
        POM_URL="https://jitpack.io/com/github/YakaTeam/kotatsu-parsers/${PARSERS_VERSION}/kotatsu-parsers-${PARSERS_VERSION}.pom"
        for i in $(seq 1 10); do
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$POM_URL")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "JitPack artifact is ready (HTTP 200)"
            exit 0
          fi
          echo "Attempt $i: JitPack returned HTTP ${HTTP_STATUS}, waiting 30s..."
          sleep 30
        done
        echo "::error::JitPack artifact for kotatsu-parsers:${PARSERS_VERSION} not available after 10 attempts"
        exit 1

    - name: Build Nightly APK
      if: steps.check.outputs.should_build == 'true'
      run: |
        ./gradlew assembleNightly --no-daemon --stacktrace \
          -PRELEASE_STORE_FILE=../release.keystore \
          -PRELEASE_STORE_PASSWORD="${{ secrets.RELEASE_STORE_PASSWORD || 'password' }}" \
          -PRELEASE_KEY_ALIAS="${{ secrets.RELEASE_KEY_ALIAS || 'release' }}" \
          -PRELEASE_KEY_PASSWORD="${{ secrets.RELEASE_KEY_PASSWORD || 'password' }}"

    - name: Prepare nightly release
      if: steps.check.outputs.should_build == 'true'
      id: nightly
      run: |
        DATE=$(date -u +%Y%m%d)
        TAG="nightly-${DATE}"
        echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        echo "date=$DATE" >> "$GITHUB_OUTPUT"

        mkdir -p release
        shopt -s nullglob
        APK_FILES=(app/build/outputs/apk/nightly/*.apk)
        if [ ${#APK_FILES[@]} -eq 0 ]; then
          echo "Error: No nightly APK found"
          exit 1
        fi
        for apk in "${APK_FILES[@]}"; do
          cp "$apk" "release/DropSauce-N${DATE}.apk"
        done

    - name: Generate changelog
      if: steps.check.outputs.should_build == 'true'
      id: changelog
      run: |
        # Get commits from the last 24 hours
        CHANGELOG=$(git log --since="24 hours ago" --pretty=format:"- %s (%h)" --no-merges)
        if [ -z "$CHANGELOG" ]; then
          CHANGELOG="- No new commits in the last 24 hours"
        fi
        echo "changelog<<EOF" >> $GITHUB_OUTPUT
        echo "$CHANGELOG" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Delete old nightly release
      if: steps.check.outputs.should_build == 'true'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Delete previous nightly tag/release to keep only latest
        gh release delete "nightly" --yes --cleanup-tag 2>/dev/null || true

    - name: Create nightly release
      if: steps.check.outputs.should_build == 'true'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        NOTES_FILE="nightly_notes.md"

        cat > "$NOTES_FILE" <<EOF
        ## 🌙 DropSauce Nightly N${{ steps.nightly.outputs.date }}

        > [!WARNING]
        > Nightly builds are automatically generated and may contain incomplete features and bugs.

        ### Commits in the last 24 hours
        ${{ steps.changelog.outputs.changelog }}
        EOF

        gh release create "nightly" release/*.apk \
          --title "Nightly Build N${{ steps.nightly.outputs.date }}" \
          --notes-file "$NOTES_FILE" \
          --prerelease
